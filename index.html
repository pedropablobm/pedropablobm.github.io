<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pedro Pablo | GitHub Pages</title>
  <style>
    :root{
      --bg:#0b1220;
      --bg-soft:#121a2b;
      --card:#172033;
      --text:#eaf2ff;
      --muted:#9db0d0;
      --line:rgba(255,255,255,.08);
      --accent:#5eead4;
      --accent-2:#60a5fa;
      --shadow:0 10px 30px rgba(0,0,0,.25);
      --radius:18px;
      --max:1100px;
    }

    @media (prefers-color-scheme: light){
      :root{
        --bg:#f6f8fc;
        --bg-soft:#ffffff;
        --card:#ffffff;
        --text:#0f172a;
        --muted:#5b6780;
        --line:rgba(15,23,42,.08);
        --accent:#0f766e;
        --accent-2:#2563eb;
        --shadow:0 10px 30px rgba(15,23,42,.08);
      }
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(96,165,250,.15), transparent 30%),
        radial-gradient(circle at top right, rgba(94,234,212,.12), transparent 28%),
        var(--bg);
      color:var(--text);
      line-height:1.6;
    }

    .wrap{
      width:min(calc(100% - 2rem), var(--max));
      margin:0 auto;
    }

    .hero{
      padding:5rem 0 2rem;
    }

    .hero h1{
      margin:0 0 .75rem;
      font-size:clamp(2rem, 5vw, 4rem);
      line-height:1.05;
      letter-spacing:-.03em;
    }

    .hero p{
      margin:0;
      max-width:700px;
      color:var(--muted);
      font-size:1.05rem;
    }

    .repos{
      padding:2rem 0 5rem;
    }

    .section-head{
      display:flex;
      align-items:end;
      justify-content:space-between;
      gap:1rem;
      margin-bottom:1.5rem;
      flex-wrap:wrap;
    }

    .section-head h2{
      margin:0;
      font-size:clamp(1.4rem, 2vw, 2rem);
      letter-spacing:-.02em;
    }

    .section-head a{
      color:var(--accent-2);
      text-decoration:none;
      font-weight:600;
    }

    .repo-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));
      gap:1rem;
    }

    .repo-card{
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)), var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:1.15rem;
      box-shadow:var(--shadow);
      transition:transform .2s ease, border-color .2s ease, box-shadow .2s ease;
      position:relative;
      overflow:hidden;
    }

    .repo-card:hover{
      transform:translateY(-4px);
      border-color:rgba(94,234,212,.35);
      box-shadow:0 18px 40px rgba(0,0,0,.18);
    }

    .repo-card::before{
      content:"";
      position:absolute;
      inset:0 auto auto 0;
      width:100%;
      height:2px;
      background:linear-gradient(90deg, var(--accent), var(--accent-2));
      opacity:.9;
    }

    .repo-top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:.75rem;
      margin-bottom:.75rem;
    }

    .repo-title{
      margin:0;
      font-size:1.05rem;
      line-height:1.3;
    }

    .repo-title a{
      color:var(--text);
      text-decoration:none;
    }

    .repo-title a:hover{
      color:var(--accent);
    }

    .repo-desc{
      margin:0 0 1rem;
      color:var(--muted);
      min-height:3.2em;
    }

    .badges{
      display:flex;
      flex-wrap:wrap;
      gap:.5rem;
      margin-bottom:1rem;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:.4rem;
      padding:.4rem .7rem;
      border:1px solid var(--line);
      border-radius:999px;
      font-size:.82rem;
      color:var(--muted);
      background:rgba(255,255,255,.03);
    }

    .dot{
      width:.55rem;
      height:.55rem;
      border-radius:50%;
      background:var(--accent);
      display:inline-block;
    }

    .repo-meta{
      display:flex;
      flex-wrap:wrap;
      gap:.9rem;
      color:var(--muted);
      font-size:.9rem;
    }

    .repo-meta span{
      display:inline-flex;
      align-items:center;
      gap:.35rem;
    }

    .loading,
    .error,
    .empty{
      padding:1rem 0;
      color:var(--muted);
    }

    .footer{
      padding:0 0 3rem;
      color:var(--muted);
      font-size:.95rem;
    }
  </style>
</head>
<body>
  <header class="hero">
    <div class="wrap">
      <h1>Hola, soy Pedro Pablo</h1>
      <p>
        Este es mi sitio personal en donde comparto algunos repositorios propios y descargados por su gran utilidad.
      </p>
    </div>
  </header>

  <main class="repos">
    <div class="wrap">
      <div class="section-head">
        <h2>Últimos repositorios</h2>
        <a href="https://github.com/pedropablobm?tab=repositories" target="_blank" rel="noopener noreferrer">
          Ver todos en GitHub →
        </a>
      </div>

      <div id="repo-status" class="loading">Cargando repositorios...</div>
      <section id="repo-grid" class="repo-grid" aria-live="polite"></section>
    </div>
  </main>

  <footer class="footer">
    <div class="wrap">
      Hecho con GitHub Pages y la API pública de GitHub.
    </div>
  </footer>

  <script>
    const USERNAME = "pedropablobm";
    const MAX_REPOS = 6;

    const repoGrid = document.getElementById("repo-grid");
    const repoStatus = document.getElementById("repo-status");

    function formatDate(dateString) {
      const date = new Date(dateString);
      return new Intl.DateTimeFormat("es-CO", {
        year: "numeric",
        month: "short",
        day: "numeric"
      }).format(date);
    }

    function escapeHtml(text = "") {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function repoCard(repo) {
      const language = repo.language
        ? `<span class="badge"><span class="dot"></span>${escapeHtml(repo.language)}</span>`
        : "";

      return `
        <article class="repo-card">
          <div class="repo-top">
            <h3 class="repo-title">
              <a href="${repo.html_url}" target="_blank" rel="noopener noreferrer">
                ${escapeHtml(repo.name)}
              </a>
            </h3>
          </div>

          <p class="repo-desc">
            ${repo.description ? escapeHtml(repo.description) : "Repositorio sin descripción todavía."}
          </p>

          <div class="badges">
            ${language}
            ${repo.fork ? `<span class="badge">Fork</span>` : ""}
            <span class="badge">Público</span>
          </div>

          <div class="repo-meta">
            <span>★ ${repo.stargazers_count}</span>
            <span>⑂ ${repo.forks_count}</span>
            <span>Creado: ${formatDate(repo.created_at)}</span>
          </div>
        </article>
      `;
    }

    async function loadRepos() {
      try {
        const url = `https://api.github.com/users/${USERNAME}/repos?sort=created&direction=desc&per_page=${MAX_REPOS}`;
        const response = await fetch(url);

        if (!response.ok) {
          throw new Error("No fue posible cargar los repositorios");
        }

        const repos = await response.json();

        if (!Array.isArray(repos) || repos.length === 0) {
          repoStatus.className = "empty";
          repoStatus.textContent = "Aún no hay repositorios públicos para mostrar.";
          return;
        }

        repoGrid.innerHTML = repos.map(repoCard).join("");
        repoStatus.remove();
      } catch (error) {
        repoStatus.className = "error";
        repoStatus.textContent = "Hubo un problema al cargar los repositorios.";
        console.error(error);
      }
    }

    loadRepos();
  </script>
</body>
</html>
